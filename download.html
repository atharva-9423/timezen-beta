
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .download-container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 90%;
    }

    .download-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .countdown {
      font-size: 48px;
      font-weight: 700;
      margin: 30px 0;
      color: #FFD700;
    }

    .filename {
      font-size: 18px;
      margin-top: 20px;
      opacity: 0.9;
      word-break: break-all;
    }

    .status {
      font-size: 16px;
      margin-top: 15px;
      opacity: 0.8;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="download-container">
    <div class="download-icon">📥</div>
    <h1>Preparing Download</h1>
    <div class="countdown" id="countdown">3</div>
    <div class="loader" id="loader"></div>
    <div class="status" id="status">Starting download in <span id="seconds">3</span> seconds...</div>
    <div class="filename" id="filename"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const fileUrl = urlParams.get('url');
    const fileName = urlParams.get('name') || 'file';

    const countdownEl = document.getElementById('countdown');
    const statusEl = document.getElementById('status');
    const secondsEl = document.getElementById('seconds');
    const filenameEl = document.getElementById('filename');
    const loaderEl = document.getElementById('loader');

    filenameEl.textContent = `File: ${decodeURIComponent(fileName)}`;

    let count = 3;

    const timer = setInterval(() => {
      count--;
      countdownEl.textContent = count;
      secondsEl.textContent = count;

      if (count <= 0) {
        clearInterval(timer);
        startDownload();
      }
    }, 1000);

    function startDownload() {
      countdownEl.style.display = 'none';
      loaderEl.style.display = 'block';
      statusEl.textContent = 'Downloading...';

      if (fileUrl) {
        // Create download link
        const a = document.createElement('a');
        a.href = decodeURIComponent(fileUrl);
        a.download = decodeURIComponent(fileName);
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(() => {
          statusEl.textContent = 'Download started! You can close this page.';
          loaderEl.style.display = 'none';
          document.querySelector('.download-icon').textContent = '✓';
        }, 1000);
      } else {
        statusEl.textContent = 'Error: No download URL provided';
        loaderEl.style.display = 'none';
      }
    }
  </script>
</body>
</html>
